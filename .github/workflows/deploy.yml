name: Deploy to DigitalOcean

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/attendee
            git pull origin main
            docker compose -f docker-compose.prod.yaml build --no-cache attendee-web attendee-worker
            docker compose -f docker-compose.prod.yaml up -d attendee-web attendee-worker
            docker image prune -f
